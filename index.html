<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Soongsil AI Promo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#020617] text-white h-screen flex flex-col items-center justify-center">
  <div id="root" class="text-center">
    <h1 class="text-4xl font-bold animate-pulse">화면을 터치하여 시작하세요</h1>
  </div>

  <script>
    // 복잡한 React 없이 순수 자바스크립트로 화면을 직접 제어합니다.
    const root = document.getElementById('root');
    root.onclick = () => {
      root.innerHTML = `
        <div class="p-10 border-2 border-cyan-500 rounded-3xl bg-slate-900">
          <h2 class="text-3xl font-black text-cyan-400">앱이 정상 구동 중입니다!</h2>
          <p class="mt-4 text-slate-300">이제 여기에 촬영용 로직을 넣으시면 됩니다.</p>
        </div>
      `;
    };
  </script>
</body>
</html>
