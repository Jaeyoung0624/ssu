<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Soongsil AI Innovation</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #020617; color: white; overflow: hidden; font-family: sans-serif; }
    .fade-in { animation: fadeIn 1s ease-in; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>
  <div id="app" class="h-screen w-full flex flex-col items-center justify-center p-6 text-center">
    <!-- 초기 화면 -->
    <div id="content" class="fade-in">
      <h1 class="text-4xl font-black text-cyan-400 mb-6">SOONGSIL AI</h1>
      <p class="text-slate-400 mb-8">숭실대학교의 미래, AI 융합의 시작</p>
      <button id="startBtn" class="px-8 py-4 bg-cyan-600 hover:bg-cyan-500 rounded-full font-bold transition-all shadow-[0_0_20px_rgba(6,182,212,0.5)]">
        시작하기
      </button>
    </div>
  </div>

  <script>
    const app = document.getElementById('app');
    const content = document.getElementById('content');
    const startBtn = document.getElementById('startBtn');

    // 단계별 화면 전환 로직
    startBtn.onclick = () => {
      content.classList.add('opacity-0');
      setTimeout(() => {
        content.innerHTML = `
          <div class="space-y-6">
            <div class="w-20 h-20 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
            <h2 class="text-2xl font-bold">시스템 분석 중...</h2>
            <div class="w-full max-w-xs bg-slate-800 h-2 rounded-full overflow-hidden">
              <div class="h-full bg-cyan-500 animate-[pulse_2s_infinite]"></div>
            </div>
          </div>
        `;
        content.classList.remove('opacity-0');
        
        // 2초 후 최종 메인 화면 표시
        setTimeout(() => {
          content.innerHTML = `
            <h1 class="text-3xl font-bold text-white">준비 완료!</h1>
            <p class="mt-4 text-cyan-300">숭실대 AI 융합 캠페인에 오신 것을 환영합니다.</p>
          `;
        }, 2000);
      }, 500);
    };
  </script>
</body>
</html>
