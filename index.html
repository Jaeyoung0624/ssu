<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Soongsil University AI Promo App</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM v18 CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel CDN (For on-the-fly JSX compilation in browser without node_modules) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Custom styled color temp slider */
    input[type="range"].range-track-temp {
      -webkit-appearance: none;
      appearance: none;
      background: linear-gradient(to right, #ff4500 0%, #ff8c00 15%, #ffd700 30%, #f0f8ff 50%, #add8e6 75%, #4682b4 100%) !important;
      height: 8px;
      border-radius: 9999px;
      outline: none;
    }

    input[type="range"].range-track-temp::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #ffffff;
      border: 4px solid #06b6d4;
      cursor: pointer;
      margin-top: -8px; 
      box-shadow: 0 0 14px rgba(6, 182, 212, 0.85), 0 2px 4px rgba(0,0,0,0.4);
      position: relative;
      z-index: 50;
    }

    /* Custom styled sound input range track */
    input[type="range"].range-track-sound {
      -webkit-appearance: none;
      appearance: none;
      background: linear-gradient(to right, #002d56, #06b6d4, #6366f1) !important;
      height: 8px;
      border-radius: 9999px;
      outline: none;
    }

    input[type="range"].range-track-sound::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #ffffff;
      border: 4px solid #6366f1;
      cursor: pointer;
      margin-top: -8px; 
      box-shadow: 0 0 14px rgba(99, 102, 241, 0.85), 0 2px 4px rgba(0,0,0,0.4);
      position: relative;
      z-index: 50;
    }

    @keyframes audio-bar-1 { 0%, 100% { height: 4px; } 50% { height: 18px; } }
    @keyframes audio-bar-2 { 0%, 100% { height: 15px; } 50% { height: 5px; } }
    @keyframes audio-bar-3 { 0%, 100% { height: 6px; } 50% { height: 20px; } }
    @keyframes audio-bar-4 { 0%, 100% { height: 13px; } 50% { height: 3px; } }
    
    .animate-audio-bar-1 { animation: audio-bar-1 0.75s ease-in-out infinite; }
    .animate-audio-bar-2 { animation: audio-bar-2 0.65s ease-in-out infinite; }
    .animate-audio-bar-3 { animation: audio-bar-3 0.85s ease-in-out infinite; }
    .animate-audio-bar-4 { animation: audio-bar-4 0.55s ease-in-out infinite; }

    .animate-fadeIn {
      animation: fadeIn 0.8s ease-out forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-[#020617] text-slate-100 h-screen max-h-screen overflow-hidden select-none">
  <div id="root" class="h-full"></div>

  <!-- React code starts here -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- CUSTOM ANIMATED AUDIO WAVE ICON FOR SCENE 03 ---
    const SoundWaveIcon = () => (
      <div className="flex items-end gap-1 h-5 w-6 pb-0.5" style={{ minWidth: '24px' }}>
        <span className="w-1 bg-cyan-400 rounded-full animate-audio-bar-1"></span>
        <span className="w-1 bg-cyan-400 rounded-full animate-audio-bar-2"></span>
        <span className="w-1 bg-cyan-400 rounded-full animate-audio-bar-3"></span>
        <span className="w-1 bg-cyan-400 rounded-full animate-audio-bar-4"></span>
      </div>
    );

    function App() {
      // Page Navigation State
      // 0: Start Empty Screen, 1: Scene 01, 2: Scene 02-B, 3: Scene 03, 4: Scene 04
      const [currentScene, setCurrentScene] = useState(0);
      
      // Scene 01 States
      const [scene1Phase, setScene1Phase] = useState(0); // 0: Center title, 1: Move up & show big A/B/C buttons
      const [scene1Alert, setScene1Alert] = useState(false);
      const [scene1Regen, setScene1Regen] = useState(false);

      // Scene 02-B States (Smooth transition & typewriter)
      const [scene2Phase, setScene2Phase] = useState(0); // 0: Center title + setup info, 1: Move up & start typing
      const [typedQuote, setTypedQuote] = useState("");
      const quoteText = "내가 못 본 가능성이 있었다.";

      // Scene 03 States (Step-by-step presentation)
      const [scene3Phase, setScene3Phase] = useState(0); // 0: Center title only, 1: Move up & show controls
      const [colorTemp, setColorTemp] = useState(5500); // Color Temp in Kelvin (1000K ~ 10000K)
      const [soundValue, setSoundValue] = useState(20);

      // Scene 04 States (Re-centering organic mind-map)
      // 0: Title Center only
      // 1: Title Up + "문학" in exact center (50%)
      // 2: "문학" moves left (32%) + "선택형 스토리" (68%) + Center Line active
      // 3: "문학" (15%) + "선택형 스토리" (50%) + 4 branches (83%)
      // 4: Show Reset & First Scene Jump Buttons
      const [evolutionStep, setEvolutionStep] = useState(0); 

      // --- AUTOMATIC TIMING AND EFFECT DISPATCHERS ---

      // SCENE 01: Center title -> Moves up & reveals big buttons
      useEffect(() => {
        if (currentScene === 1) {
          setScene1Phase(0);
          setScene1Alert(false);
          setScene1Regen(false);
          const timer = setTimeout(() => {
            setScene1Phase(1);
          }, 1200);
          return () => clearTimeout(timer);
        }
      }, [currentScene]);

      // SCENE 02-B: Center title -> Moves up & triggers typewriter quote
      useEffect(() => {
        if (currentScene === 2) {
          setScene2Phase(0);
          setTypedQuote("");
          
          const timerPhase = setTimeout(() => {
            setScene2Phase(1);
          }, 1400);

          return () => clearTimeout(timerPhase);
        }
      }, [currentScene]);

      // Safe Typewriter algorithm for SCENE 02-B (Guarantees correct letter output without skips)
      useEffect(() => {
        if (currentScene === 2 && scene2Phase === 1) {
          setTypedQuote("");
          let index = 0;
          const typingInterval = setInterval(() => {
            index++;
            setTypedQuote(quoteText.slice(0, index));
            if (index >= quoteText.length) {
              clearInterval(typingInterval);
            }
          }, 120); // Elegant typing speed
          return () => clearInterval(typingInterval);
        }
      }, [currentScene, scene2Phase]);

      // SCENE 03: Center title ONLY -> Moves up & reveals control sliders
      useEffect(() => {
        if (currentScene === 3) {
          setScene3Phase(0);
          const timer = setTimeout(() => {
            setScene3Phase(1);
          }, 1300);
          return () => clearTimeout(timer);
        }
      }, [currentScene]);

      // SCENE 04: Initialized Step to 0
      useEffect(() => {
        if (currentScene === 4) {
          setEvolutionStep(0);
        }
      }, [currentScene]);

      // Handle Option C in Scene 1
      const handleOptionC = () => {
        setScene1Regen(true);
        setTimeout(() => {
          setScene1Regen(false);
        }, 1200);
      };

      // Scene 4 click-to-advance handler
      const handleScene4Tap = (e) => {
        // Prevent triggering tap when clicking structural reset/home shortcut buttons
        if (e.target.closest('button')) return;
        
        if (evolutionStep < 4) {
          setEvolutionStep(prev => prev + 1);
        }
      };

      // --- Dynamic SVG Connection Paths for Scene 04 (Based on active step) ---
      let line1Path = "M 500 170 L 500 170"; // Default: collapsed at center
      let lineOpacity = 0;

      if (evolutionStep === 2) {
        line1Path = "M 320 170 L 680 170"; // Connecting Stage 01 and Stage 02
        lineOpacity = 1;
      } else if (evolutionStep >= 3) {
        line1Path = "M 150 170 L 500 170"; // Adjusts to Stage 01 (15%) and Stage 02 (50%)
        lineOpacity = 1;
      }

      // Branches sprout from "선택형 스토리" (500, 170) to 4 branch coords (830, y) at Step >= 3
      let branch1Path = "M 500 170 L 500 170";
      let branch2Path = "M 500 170 L 500 170";
      let branch3Path = "M 500 170 L 500 170";
      let branch4Path = "M 500 170 L 500 170";
      let branchesOpacity = 0;

      if (evolutionStep >= 3) {
        branch1Path = "M 500 170 C 590 170, 710 50, 830 50";
        branch2Path = "M 500 170 C 590 170, 710 120, 830 120";
        branch3Path = "M 500 170 C 590 170, 710 220, 830 220";
        branch4Path = "M 500 170 C 590 170, 710 290, 830 290";
        branchesOpacity = 1;
      }

      return (
        <div 
          className="relative h-screen max-h-screen bg-[#020617] text-slate-100 font-sans overflow-hidden flex flex-col justify-between"
          onClick={(e) => {
            // Scene 0 -> Screen Touch triggers Scene 1
            if (currentScene === 0) {
              setCurrentScene(1);
            }
            // Scene 2-B -> Screen Touch triggers Scene 3
            else if (currentScene === 2 && scene2Phase === 1) {
              setCurrentScene(3);
            }
            // Scene 4 -> Touch advances evolution step-by-step
            else if (currentScene === 4) {
              handleScene4Tap(e);
            }
          }}
        >
          
          {/* 🌌 AMBIENT BACKGROUND GLOWS */}
          <div className="absolute top-[-15%] left-[-10%] w-[50%] h-[50%] rounded-full bg-[#002d56]/50 blur-[130px] pointer-events-none" />
          <div className="absolute bottom-[-10%] right-[-10%] w-[60%] h-[50%] rounded-full bg-cyan-950/40 blur-[140px] pointer-events-none" />
          <div className="absolute top-[35%] left-[30%] w-[35%] h-[35%] rounded-full bg-blue-950/30 blur-[160px] pointer-events-none" />

          {/* High-tech overlay grid */}
          <div className="absolute inset-0 bg-[linear-gradient(to_right,#0ea5e908_1px,transparent_1px),linear-gradient(to_bottom,#0ea5e908_1px,transparent_1px)] bg-[size:4rem_4rem] pointer-events-none" />

          {/* 📟 HEADER */}
          <header className="relative z-40 px-8 py-4 flex justify-between items-center border-b border-blue-900/10 bg-[#020617]/75 backdrop-blur-md">
            <div className="flex items-center gap-3">
              <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-[#002D56] to-cyan-500 flex items-center justify-center font-black text-cyan-200 text-xs tracking-widest shadow-[0_0_20px_rgba(6,182,212,0.35)]">
                SSU
              </div>
              <div>
                <span className="text-xs font-bold text-slate-400 tracking-widest block leading-none">SOONGSIL AI MEDIA</span>
                <span className="text-[9px] text-cyan-400/70 font-mono tracking-wider">SCENARIO PROP CONTROL</span>
              </div>
            </div>

            <div className="flex items-center gap-2 bg-slate-900/80 px-3 py-1 rounded-full border border-cyan-500/10">
              <span className="inline-block w-1.5 h-1.5 rounded-full bg-cyan-400 animate-ping" />
              <span className="text-[9.5px] font-mono text-cyan-400 tracking-widest">ACTIVE TRANSIT MODE</span>
            </div>
          </header>

          {/* 🎭 MAIN INTERACTIVE AREA (iPad Pro 11-inch aspect-optimized padding) */}
          <main className="relative flex-1 flex flex-col justify-center items-center px-6 md:px-16 py-4 z-30 w-full overflow-hidden">

            {/* SCENE 00 */}
            {currentScene === 0 && (
              <div className="w-full flex flex-col items-center justify-center h-full py-12 animate-fadeIn cursor-pointer">
                <div className="text-center space-y-4">
                  <div className="w-12 h-12 rounded-full border border-cyan-500/10 flex items-center justify-center mx-auto mb-2 animate-pulse">
                    <span className="w-2 h-2 rounded-full bg-cyan-400 animate-ping" />
                  </div>
                  <p className="text-slate-500 font-mono text-sm tracking-widest uppercase">
                    System Initialized. Tap screen to start shoot.
                  </p>
                </div>
              </div>
            )}

            {/* SCENE 01 */}
            {currentScene === 1 && (
              <div className="w-full max-w-4xl flex flex-col justify-center gap-8 portrait:gap-6 landscape:gap-10 h-full py-2 transition-all duration-700 animate-fadeIn">
                <div className={`text-center transition-all duration-[1200ms] ease-out ${
                  scene1Phase === 0 
                    ? 'translate-y-[15vh] portrait:translate-y-[18vh] landscape:translate-y-[12vh] scale-110' 
                    : 'translate-y-0 scale-100'
                }`}>
                  <div className="inline-block bg-[#002D56]/60 border border-blue-500/30 rounded-full px-4 py-1 mb-3 text-[11px] font-mono text-cyan-400 tracking-widest shadow-[0_0_15px_rgba(6,182,212,0.15)]">
                    SCENE 01
                  </div>
                  <h1 className="text-2xl md:text-4xl portrait:text-2xl landscape:text-3xl xl:text-4xl font-extrabold tracking-tight bg-gradient-to-r from-white via-cyan-100 to-blue-200 bg-clip-text text-transparent drop-shadow-lg">
                    주인공은 AI가 쓴 글을 발견한다.
                  </h1>
                </div>

                <div className="my-2 flex items-center justify-center min-h-[50px]">
                  {scene1Regen && (
                    <div className="flex items-center gap-3 bg-slate-900/50 px-6 py-3 rounded-xl border border-indigo-500/20 animate-pulse">
                      <div className="w-4 h-4 border-2 border-t-transparent border-indigo-400 rounded-full animate-spin"></div>
                      <span className="text-xs font-mono text-indigo-300">SYSTEM REGENERATING TEXT DATA...</span>
                    </div>
                  )}
                </div>

                {/* Elevated Button Container: Raised up to lower-middle area, far from bottom footer */}
                <div className={`transition-all duration-[1200ms] ease-out ${
                  scene1Phase >= 1 ? 'opacity-100 translate-y-[-4vh] portrait:translate-y-0' : 'opacity-0 translate-y-16 pointer-events-none'
                }`}>
                  <div className="grid grid-cols-3 gap-4 portrait:gap-3 landscape:gap-6">
                    <button
                      onClick={() => setScene1Alert(true)}
                      className="group relative bg-[#090d1a]/80 hover:bg-red-950/20 border-2 border-slate-800 hover:border-red-500/60 rounded-2xl py-8 portrait:py-5 landscape:py-8 px-4 transition-all duration-300 text-center active:scale-[0.98] shadow-lg"
                    >
                      <span className="text-lg md:text-2xl portrait:text-base landscape:text-lg xl:text-2xl font-black text-red-400 group-hover:text-red-300 tracking-wide transition-colors block">
                        A. 화를 낸다
                      </span>
                    </button>

                    <button
                      onClick={(e) => {
                        e.stopPropagation();
                        setCurrentScene(2);
                      }}
                      className="group relative bg-[#002D56]/40 hover:bg-[#002D56]/70 border-2 border-cyan-500/40 hover:border-cyan-400 rounded-2xl py-8 portrait:py-5 landscape:py-8 px-4 transition-all duration-300 text-center active:scale-[0.98] shadow-[0_0_25px_rgba(6,182,212,0.15)]"
                    >
                      <span className="text-lg md:text-2xl portrait:text-base landscape:text-lg xl:text-2xl font-black text-cyan-300 group-hover:text-white tracking-wide transition-colors block">
                        B. 분석한다
                      </span>
                    </button>

                    <button
                      onClick={handleOptionC}
                      className="group relative bg-[#090d1a]/80 hover:bg-indigo-950/20 border-2 border-slate-800 hover:border-indigo-500/60 rounded-2xl py-8 portrait:py-5 landscape:py-8 px-4 transition-all duration-300 text-center active:scale-[0.98] shadow-lg"
                    >
                      <span className="text-lg md:text-2xl portrait:text-base landscape:text-lg xl:text-2xl font-black text-indigo-400 group-hover:text-indigo-300 tracking-wide transition-colors block">
                        C. 다시 질문한다
                      </span>
                    </button>
                  </div>
                </div>

                {scene1Alert && (
                  <div className="fixed inset-0 z-50 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 animate-fadeIn" onClick={(e) => e.stopPropagation()}>
                    <div className="bg-[#0f172a] border-2 border-red-500 rounded-2xl p-8 max-w-sm text-center shadow-2xl">
                      <span className="text-red-500 text-4xl block mb-3 font-bold animate-pulse">⚠</span>
                      <h4 className="text-red-400 font-extrabold mb-2 font-mono text-base tracking-wider">ALERT STATE TRACE</h4>
                      <p className="text-slate-300 text-sm leading-relaxed mb-6">
                        주인공의 심리적 저항감 발생 연출 구역. 시스템을 리셋하거나 안전화 모드를 승인하세요.
                      </p>
                      <button 
                        onClick={() => setScene1Alert(false)}
                        className="w-full bg-red-600 hover:bg-red-500 text-white text-xs font-bold py-3 rounded-lg font-mono transition-colors"
                      >
                        CLOSE EXHAUST WARNING
                      </button>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* SCENE 02-B */}
            {currentScene === 2 && (
              <div className="w-full max-w-4xl flex flex-col justify-between h-full py-4 cursor-pointer group animate-fadeIn">
                <div className={`text-center transition-all duration-[1200ms] ease-out ${
                  scene2Phase === 0 
                    ? 'translate-y-[15vh] portrait:translate-y-[18vh] landscape:translate-y-[10vh] scale-105' 
                    : 'translate-y-0 scale-100'
                }`}>
                  <div className="inline-block bg-[#002D56]/60 border border-blue-500/30 rounded-full px-4 py-1.5 mb-3 text-[11px] font-mono text-cyan-400 tracking-widest shadow-[0_0_15px_rgba(6,182,212,0.15)]">
                    SCENE 02-B
                  </div>
                  <h1 className="text-3xl md:text-4xl font-extrabold tracking-tight bg-gradient-to-r from-cyan-400 via-blue-200 to-white bg-clip-text text-transparent drop-shadow-lg">
                    분석 루트
                  </h1>
                  
                  <div className="flex justify-center gap-6 text-base md:text-lg font-mono text-slate-300 tracking-wider mt-4">
                    <span className="bg-slate-900/95 px-5 py-2 rounded-full border border-slate-800 shadow-md">
                      조명 : <strong className="text-amber-400 font-extrabold">밝게</strong>
                    </span>
                    <span className="bg-slate-900/95 px-5 py-2 rounded-full border border-slate-800 shadow-md">
                      사운드 : <strong className="text-cyan-400 font-extrabold">낮게</strong>
                    </span>
                  </div>
                </div>

                <div className={`my-8 portrait:my-12 landscape:my-8 text-center py-12 portrait:py-20 landscape:py-12 px-8 bg-[#002D56]/10 border-2 border-cyan-500/20 rounded-3xl relative overflow-hidden transition-all duration-[1200ms] ease-out ${
                  scene2Phase >= 1 ? 'opacity-100 scale-100 translate-y-0 shadow-[0_0_40px_rgba(6,182,212,0.15)]' : 'opacity-0 scale-95 translate-y-12 pointer-events-none'
                }`}>
                  <div className="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-cyan-500/5 via-transparent to-transparent pointer-events-none" />
                  <span className="text-slate-500 text-xs block font-mono tracking-widest mb-3">
                    [ UNCOVERED PROVECT ]
                  </span>
                  
                  <h2 className="text-2xl md:text-5xl portrait:text-2xl landscape:text-3xl xl:text-5xl font-black text-white tracking-tight drop-shadow-[0_4px_25px_rgba(6,182,212,0.3)] min-h-[60px] flex items-center justify-center">
                    <span>{typedQuote}</span>
                    <span className="inline-block w-1.5 h-8 md:h-12 bg-cyan-400 ml-1.5 animate-pulse" />
                  </h2>
                </div>

                <div className={`mt-auto text-center transition-all duration-[1000ms] delay-300 ${scene2Phase >= 1 ? 'opacity-100 mb-4' : 'opacity-0'}`}>
                  <p className="text-xs font-mono text-cyan-400 animate-pulse tracking-widest uppercase">
                    ⚡ 화면 아무 곳이나 터치하여 다음으로 진행
                  </p>
                </div>
              </div>
            )}

            {/* SCENE 03 */}
            {currentScene === 3 && (
              <div className="w-full max-w-4xl flex flex-col justify-between h-full py-4 animate-fadeIn">
                <div className={`text-center transition-all duration-[1200ms] ease-out ${
                  scene3Phase === 0 
                    ? 'translate-y-[15vh] portrait:translate-y-[18vh] landscape:translate-y-[10vh] scale-110' 
                    : 'translate-y-0 scale-100'
                }`}>
                  <div className="inline-block bg-[#002D56]/50 border border-blue-500/30 rounded-full px-4 py-1 mb-3 text-[11px] font-mono text-cyan-400 tracking-widest">
                    SCENE 03
                  </div>
                  <h1 className="text-3xl md:text-4xl font-extrabold tracking-tight text-white">
                    체험 확장 센서 입력
                  </h1>
                </div>

                <div className={`my-6 space-y-4 portrait:space-y-8 landscape:space-y-4 transition-all duration-[1200ms] ease-out w-full max-w-3xl mx-auto ${
                  scene3Phase >= 1 ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-16 pointer-events-none'
                }`}>
                  {/* 조명 색온도 (Range: 1000K to 10000K) */}
                  <div className="bg-[#090d1a]/95 border border-cyan-500/15 hover:border-cyan-400/30 p-5 rounded-2xl transition-all duration-300 shadow-lg">
                    <div className="flex justify-between items-center mb-3">
                      <div className="flex items-center gap-2">
                        <span className="w-2.5 h-2.5 rounded-full bg-amber-400 animate-ping" />
                        <span className="text-base font-bold text-slate-200">조명 색온도</span>
                      </div>
                      <span className="font-mono text-sm text-amber-300 font-bold">{colorTemp} K</span>
                    </div>
                    
                    <div className="flex items-center gap-4">
                      <button 
                        onClick={() => setColorTemp(Math.max(1000, colorTemp - 500))} 
                        className="w-10 h-10 rounded-xl bg-slate-800 hover:bg-slate-700 font-mono text-lg transition-colors flex items-center justify-center font-bold"
                      >
                        -
                      </button>
                      <div className="flex-1 relative py-4 flex items-center justify-center">
                        <input 
                          type="range" 
                          min="1000" 
                          max="10000" 
                          step="500"
                          value={colorTemp} 
                          onChange={(e) => setColorTemp(parseInt(e.target.value))}
                          className="w-full h-2 bg-slate-800 rounded-lg appearance-none cursor-pointer range-track-temp outline-none"
                        />
                      </div>
                      <button 
                        onClick={() => setColorTemp(Math.min(10000, colorTemp + 500))} 
                        className="w-10 h-10 rounded-xl bg-slate-800 hover:bg-slate-700 font-mono text-lg transition-colors flex items-center justify-center font-bold"
                      >
                        +
                      </button>
                    </div>
                  </div>

                  {/* 사운드 변화 */}
                  <div className="bg-[#090d1a]/95 border border-blue-500/15 hover:border-blue-400/30 p-5 rounded-2xl transition-all duration-300 shadow-lg">
                    <div className="flex justify-between items-center mb-3">
                      <div className="flex items-center gap-3">
                        <SoundWaveIcon />
                        <span className="text-base font-bold text-slate-200">사운드 변화</span>
                      </div>
                      <span className="font-mono text-sm text-cyan-300 font-bold">{soundValue} dB</span>
                    </div>
                    
                    <div className="flex items-center gap-4">
                      <button 
                        onClick={() => setSoundValue(Math.max(0, soundValue - 5))} 
                        className="w-10 h-10 rounded-xl bg-slate-800 hover:bg-slate-700 font-mono text-lg transition-colors flex items-center justify-center font-bold"
                      >
                        -
                      </button>
                      <div className="flex-1 relative py-4 flex items-center justify-center">
                        <input 
                          type="range" 
                          min="0" 
                          max="100" 
                          value={soundValue} 
                          onChange={(e) => setSoundValue(parseInt(e.target.value))}
                          className="w-full h-2 bg-slate-800 rounded-lg appearance-none cursor-pointer range-track-sound outline-none"
                        />
                      </div>
                      <button 
                        onClick={() => setSoundValue(Math.min(100, soundValue + 5))} 
                        className="w-10 h-10 rounded-xl bg-slate-800 hover:bg-slate-700 font-mono text-lg transition-colors flex items-center justify-center font-bold"
                      >
                        +
                      </button>
                    </div>
                  </div>
                </div>

                <div className={`mt-auto text-center transition-all duration-[1200ms] ease-out ${
                  scene3Phase >= 1 ? 'opacity-100 translate-y-0 mb-4' : 'opacity-0 translate-y-16 pointer-events-none'
                }`}>
                  <button
                    onClick={(e) => {
                      e.stopPropagation();
                      setCurrentScene(4);
                      setEvolutionStep(0);
                    }}
                    className="inline-block px-12 py-3.5 text-base font-mono text-cyan-400 animate-pulse tracking-widest uppercase transition-all duration-300 hover:text-cyan-300"
                  >
                    ⚡ 터치하여 다음 단계로 진행
                  </button>
                </div>
              </div>
            )}

            {/* SCENE 04 (iPad 11" Optimized Viewport Box) */}
            {currentScene === 4 && (
              <div className="w-full max-w-5xl flex flex-col justify-between h-full py-2 animate-fadeIn overflow-hidden">
                <div className={`text-center transition-all duration-[1200ms] ease-out ${
                  evolutionStep === 0 
                    ? 'translate-y-[12vh] portrait:translate-y-[15vh] landscape:translate-y-[10vh] scale-110' 
                    : 'translate-y-0 scale-100'
                }`}>
                  <div className="inline-block bg-[#002D56]/60 border border-blue-500/20 rounded-full px-4 py-1.5 mb-1.5 text-xs font-mono text-cyan-300 tracking-widest shadow-[0_0_15px_rgba(6,182,212,0.1)]">
                    SCENE 04 (FINAL EVOLUTION)
                  </div>
                  <h1 className="text-xl md:text-3xl portrait:text-xl landscape:text-2xl xl:text-3xl font-black text-white">
                    문학에서 최첨단 뉴미디어 콘텐츠로의 진화 과정
                  </h1>
                  <p className="text-[10px] text-slate-500 font-mono mt-0.5">
                    SCREEN TAP PROGRESSION // STEP {Math.min(evolutionStep, 3)} OF 3
                  </p>
                </div>

                <div className={`my-2 flex items-center justify-center transition-all duration-[1200ms] ease-out ${
                  evolutionStep >= 1 ? 'opacity-100 scale-100 translate-y-0' : 'opacity-0 scale-95 translate-y-16 pointer-events-none'
                }`}>
                  
                  {/* Height perfectly restricted dynamically based on layout to prevent scrollbars */}
                  <div className="relative w-full h-[280px] portrait:h-[420px] landscape:h-[280px] xl:h-[340px] max-w-4xl bg-[#090d1a]/30 rounded-3xl border border-slate-900/60 overflow-hidden shadow-inner">
                    <svg className="absolute inset-0 w-full h-full pointer-events-none z-10" viewBox="0 0 1000 340" preserveAspectRatio="none">
                      
                      {/* --- ROOT LINE 1 (문학 ➜ 선택형 스토리) --- */}
                      <path 
                        d={line1Path}
                        fill="none" 
                        stroke="#10b981" 
                        strokeWidth="20" 
                        className="transition-all duration-[1000ms] ease-in-out"
                        style={{ opacity: lineOpacity * 0.25, filter: 'blur(8px)' }}
                      />
                      <path 
                        d={line1Path}
                        fill="none" 
                        stroke="#10b981" 
                        strokeWidth="10" 
                        className="transition-all duration-[1000ms] ease-in-out"
                        style={{ opacity: lineOpacity * 0.55, filter: 'blur(3px)' }}
                      />
                      <path 
                        d={line1Path}
                        fill="none" 
                        stroke="#34d399" 
                        strokeWidth="4" 
                        className="transition-all duration-[1000ms] ease-in-out"
                        style={{ opacity: lineOpacity }}
                      />

                      {/* --- BRANCH 1 --- */}
                      <path 
                        d={branch1Path}
                        fill="none" 
                        stroke="#06b6d4" 
                        strokeWidth="18" 
                        className="transition-all duration-[1000ms] ease-in-out"
                        style={{ opacity: branchesOpacity * 0.25, filter: 'blur(8px)' }}
                      />
                      <path 
                        d={branch1Path}
                        fill="none" 
                        stroke="#06b6d4" 
                        strokeWidth="9" 
                        className="transition-all duration-[1000ms] ease-in-out"
                        style={{ opacity: branchesOpacity * 0.55, filter: 'blur(3px)' }}
                      />
                      <path 
                        d={branch1Path}
                        fill="none" 
                        stroke="#22d3ee" 
                        strokeWidth="3.5" 
                        className="transition-all duration-[1000ms] ease-in-out"
                        style={{ opacity: branchesOpacity }}
                      />

                      {/* --- BRANCH 2 --- */}
                      <path 
                        d={branch2Path}
                        fill="none" 
                        stroke="#06b6d4" 
                        strokeWidth="18" 
                        className="transition-all duration-[1000ms] ease-in-out"
                        style={{ opacity: branchesOpacity * 0.25, filter: 'blur(8px)' }}
                      />
                      <path 
                        d={branch2Path}
                        fill="none" 
                        stroke="#06b6d4" 
                        strokeWidth="9" 
                        className="transition-all duration-[1000ms] ease-in-out"
                        style={{ opacity: branchesOpacity * 0.55, filter: 'blur(3px)' }}
                      />
                      <path 
                        d={branch2Path}
                        fill="none" 
                        stroke="#22d3ee" 
                        strokeWidth="3.5" 
                        className="transition-all duration-[1000ms] ease-in-out"
                        style={{ opacity: branchesOpacity }}
                      />

                      {/* --- BRANCH 3 --- */}
                      <path 
                        d={branch3Path}
                        fill="none" 
                        stroke="#06b6d4" 
                        strokeWidth="18" 
                        className="transition-all duration-[1000ms] ease-in-out"
                        style={{ opacity: branchesOpacity * 0.25, filter: 'blur(8px)' }}
                      />
                      <path 
                        d={branch3Path}
                        fill="none" 
                        stroke="#06b6d4" 
                        strokeWidth="9" 
                        className="transition-all duration-[1000ms] ease-in-out"
                        style={{ opacity: branchesOpacity * 0.55, filter: 'blur(3px)' }}
                      />
                      <path 
                        d={branch3Path}
                        fill="none" 
                        stroke="#22d3ee" 
                        strokeWidth="3.5" 
                        className="transition-all duration-[1000ms] ease-in-out"
                        style={{ opacity: branchesOpacity }}
                      />

                      {/* --- BRANCH 4 --- */}
                      <path 
                        d={branch4Path}
                        fill="none" 
                        stroke="#06b6d4" 
                        strokeWidth="18" 
                        className="transition-all duration-[1000ms] ease-in-out"
                        style={{ opacity: branchesOpacity * 0.25, filter: 'blur(8px)' }}
                      />
                      <path 
                        d={branch4Path}
                        fill="none" 
                        stroke="#06b6d4" 
                        strokeWidth="9" 
                        className="transition-all duration-[1000ms] ease-in-out"
                        style={{ opacity: branchesOpacity * 0.55, filter: 'blur(3px)' }}
                      />
                      <path 
                        d={branch4Path}
                        fill="none" 
                        stroke="#22d3ee" 
                        strokeWidth="3.5" 
                        className="transition-all duration-[1000ms] ease-in-out"
                        style={{ opacity: branchesOpacity }}
                      />
                    </svg>

                    <div className="absolute inset-0 z-20">
                      {/* Node 1: 문학 (Initially positioned at 50% for Stage 0 and 1, slides left dynamically) */}
                      <div 
                        className="absolute -translate-x-1/2 -translate-y-1/2 transition-all duration-[1000ms] ease-in-out"
                        style={{ 
                          left: (evolutionStep === 0 || evolutionStep === 1) ? '50%' : evolutionStep === 2 ? '32%' : '15%',
                          top: '50%',
                          opacity: evolutionStep >= 1 ? 1 : 0,
                          transform: `translate(-50%, -50%) scale(${evolutionStep >= 1 ? 1 : 0.85})`
                        }}
                      >
                        <div className="bg-[#020617] border-2 border-emerald-400 rounded-2xl px-4 py-3 portrait:px-3 portrait:py-2.5 w-36 portrait:w-28 landscape:w-32 md:landscape:w-40 text-center shadow-[0_0_25px_rgba(16,185,129,0.35)]">
                          <span className="text-[9px] md:text-[10px] font-mono text-emerald-400 block mb-0.5">STAGE 01</span>
                          <h3 className="text-base md:text-lg font-black text-white tracking-widest">문학</h3>
                        </div>
                      </div>

                      {/* Node 2: 선택형 스토리 */}
                      <div 
                        className="absolute -translate-x-1/2 -translate-y-1/2 transition-all duration-[1000ms] ease-in-out"
                        style={{ 
                          left: evolutionStep === 2 ? '68%' : '50%',
                          top: '50%',
                          opacity: evolutionStep >= 2 ? 1 : 0,
                          transform: `translate(-50%, -50%) scale(${evolutionStep >= 2 ? 1 : 0.85})`
                        }}
                      >
                        <div className="bg-[#020617] border-2 border-emerald-400 rounded-2xl px-4 py-3 portrait:px-3 portrait:py-2.5 w-40 portrait:w-32 landscape:w-36 md:landscape:w-44 text-center shadow-[0_0_25px_rgba(16,185,129,0.35)]">
                          <span className="text-[9px] md:text-[10px] font-mono text-emerald-400 block mb-0.5">STAGE 02</span>
                          <h3 className="text-sm md:text-base font-black text-emerald-200 tracking-wide">선택형 스토리</h3>
                        </div>
                      </div>

                      {/* Stage 3 Branch Nodes (Positioned absolutely using precise percentages matching SVG heights) */}
                      {/* branch 1: 영상 */}
                      <div 
                        className="absolute -translate-x-1/2 -translate-y-1/2 transition-all duration-[1000ms] ease-in-out"
                        style={{ 
                          left: '83%',
                          top: '14.7%',
                          opacity: evolutionStep >= 3 ? 1 : 0,
                          transform: `translate(-50%, -50%) scale(${evolutionStep >= 3 ? 1 : 0.8})`
                        }}
                      >
                        <div className="bg-[#020617] border-2 border-cyan-500 rounded-xl px-3 py-1.5 portrait:px-2 portrait:py-1 w-28 portrait:w-22 landscape:w-28 md:landscape:w-36 text-center shadow-[0_0_15px_rgba(6,182,212,0.3)]">
                          <span className="text-[8px] md:text-[9px] font-mono text-cyan-400 block mb-0.5">MEDIA</span>
                          <h4 className="text-xs md:text-sm font-bold text-white">영상</h4>
                        </div>
                      </div>

                      {/* branch 2: 게임 */}
                      <div 
                        className="absolute -translate-x-1/2 -translate-y-1/2 transition-all duration-[1000ms] ease-in-out"
                        style={{ 
                          left: '83%',
                          top: '35.3%',
                          opacity: evolutionStep >= 3 ? 1 : 0,
                          transform: `translate(-50%, -50%) scale(${evolutionStep >= 3 ? 1 : 0.8})`
                        }}
                      >
                        <div className="bg-[#020617] border-2 border-cyan-500 rounded-xl px-3 py-1.5 portrait:px-2 portrait:py-1 w-28 portrait:w-22 landscape:w-28 md:landscape:w-36 text-center shadow-[0_0_15px_rgba(6,182,212,0.3)]">
                          <span className="text-[8px] md:text-[9px] font-mono text-cyan-400 block mb-0.5">GAME</span>
                          <h4 className="text-xs md:text-sm font-bold text-white">게임</h4>
                        </div>
                      </div>

                      {/* branch 3: 전시 */}
                      <div 
                        className="absolute -translate-x-1/2 -translate-y-1/2 transition-all duration-[1000ms] ease-in-out"
                        style={{ 
                          left: '83%',
                          top: '64.7%',
                          opacity: evolutionStep >= 3 ? 1 : 0,
                          transform: `translate(-50%, -50%) scale(${evolutionStep >= 3 ? 1 : 0.8})`
                        }}
                      >
                        <div className="bg-[#020617] border-2 border-cyan-500 rounded-xl px-3 py-1.5 portrait:px-2 portrait:py-1 w-28 portrait:w-22 landscape:w-28 md:landscape:w-36 text-center shadow-[0_0_15px_rgba(6,182,212,0.3)]">
                          <span className="text-[8px] md:text-[9px] font-mono text-cyan-400 block mb-0.5">EXHIBITION</span>
                          <h4 className="text-xs md:text-sm font-bold text-white">전시</h4>
                        </div>
                      </div>

                      {/* branch 4: 체험형 콘텐츠 */}
                      <div 
                        className="absolute -translate-x-1/2 -translate-y-1/2 transition-all duration-[1000ms] ease-in-out"
                        style={{ 
                          left: '83%',
                          top: '85.3%',
                          opacity: evolutionStep >= 3 ? 1 : 0,
                          transform: `translate(-50%, -50%) scale(${evolutionStep >= 3 ? 1 : 0.8})`
                        }}
                      >
                        <div className="bg-[#002d56] border-2 border-cyan-400 rounded-xl px-3 py-1.5 portrait:px-2 portrait:py-1 w-28 portrait:w-22 landscape:w-28 md:landscape:w-36 text-center shadow-[0_0_25px_rgba(6,182,212,0.5)]">
                          <span className="text-[8px] md:text-[9px] font-mono text-cyan-300 block mb-0.5">INTERACT</span>
                          <h4 className="text-[10px] md:text-xs font-black text-cyan-100">체험형 콘텐츠</h4>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>

                <div className="text-center mt-auto min-h-[50px] flex items-center justify-center">
                  {evolutionStep < 4 ? (
                    <div className="bg-slate-900/60 inline-block px-8 py-2.5 rounded-full border border-cyan-500/10 shadow-lg animate-pulse mb-2">
                      <p className="text-xs font-mono text-cyan-400 tracking-widest uppercase">
                        👉 화면 아무 곳이나 터치하여 뿌리 진화 진행
                      </p>
                    </div>
                  ) : (
                    <div className="flex justify-center gap-4 animate-fadeIn mb-2">
                      <button 
                        onClick={(e) => {
                          e.stopPropagation();
                          setEvolutionStep(0);
                        }}
                        className="bg-slate-900 hover:bg-slate-800 border border-slate-700 px-6 py-2.5 rounded-xl text-xs font-bold transition-all text-slate-300 flex items-center gap-2"
                      >
                        🔄 진화 리셋 (재촬영용)
                      </button>
                      <button 
                        onClick={(e) => {
                          e.stopPropagation();
                          setCurrentScene(0); // 00. 초기화 상태로 완벽하게 복귀
                        }}
                        className="bg-[#002D56] hover:bg-cyan-600 text-white px-6 py-2.5 rounded-xl text-xs font-bold transition-all shadow-[0_0_15px_rgba(6,182,212,0.2)]"
                      >
                        🔄 첫 씬으로 이동
                      </button>
                    </div>
                  )}
                </div>
              </div>
            )}

          </main>

          {/* 🛠️ CONTROLLER FOOTER */}
          <footer className="relative z-40 bg-[#020617] border-t border-slate-900/60 px-6 py-4 flex flex-wrap justify-between items-center gap-4 text-xs">
            <div className="flex items-center gap-2">
              <span className="font-mono text-[10px] text-slate-500 uppercase tracking-widest">Scene Jump:</span>
              <div className="flex gap-2">
                {[
                  { id: 0, label: '00. 초기화' },
                  { id: 1, label: '01. AI 발견' },
                  { id: 2, label: '02. 분석 루트' },
                  { id: 3, label: '03. 센서 입력' },
                  { id: 4, label: '04. 진화 단계' },
                ].map((scene) => (
                  <button
                    key={scene.id}
                    onClick={(e) => {
                      e.stopPropagation();
                      setCurrentScene(scene.id);
                      if (scene.id === 4) setEvolutionStep(0);
                    }}
                    className={`px-3 py-1.5 rounded-lg font-bold text-[10px] font-mono transition-all ${
                      currentScene === scene.id 
                        ? 'bg-cyan-500 text-[#020617] shadow-[0_0_15px_rgba(6,182,212,0.45)]' 
                        : 'bg-slate-900 text-slate-400 hover:bg-slate-800 border border-slate-800/80'
                    }`}
                  >
                    {scene.label}
                  </button>
                ))}
              </div>
            </div>

            <div className="text-slate-600 font-mono text-[9px] tracking-widest">
              SOONGSIL UNIV AI CONVERGENCE CAMPAIGN
            </div>
          </footer>
        </div>
      );
    }

    // Mount React App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
