<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Soongsil AI Innovation</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #020617; color: white; overflow: hidden; font-family: sans-serif; }
    .scene { transition: opacity 0.5s ease-in-out; }
  </style>
</head>
<body>
  <div id="app" class="h-screen w-full flex flex-col items-center justify-between p-6">
    
    <!-- 메인 콘텐츠 영역 -->
    <div id="main-content" class="flex-grow flex flex-col items-center justify-center scene">
      <h1 id="title" class="text-3xl font-black text-cyan-400">SOONGSIL AI</h1>
      <p id="desc" class="text-slate-400 mt-2">융합 캠페인 모듈을 시작합니다.</p>
    </div>

    <!-- 하단 내비게이션 바 -->
    <footer class="w-full pb-4 border-t border-slate-800 pt-4">
      <div class="flex gap-2 justify-center overflow-x-auto">
        <button onclick="changeScene(0)" class="px-3 py-1 bg-slate-900 border border-slate-700 rounded text-[10px]">00.초기화</button>
        <button onclick="changeScene(1)" class="px-3 py-1 bg-slate-900 border border-slate-700 rounded text-[10px]">01.AI발견</button>
        <button onclick="changeScene(2)" class="px-3 py-1 bg-slate-900 border border-slate-700 rounded text-[10px]">02.분석</button>
        <button onclick="changeScene(3)" class="px-3 py-1 bg-slate-900 border border-slate-700 rounded text-[10px]">03.센서</button>
        <button onclick="changeScene(4)" class="px-3 py-1 bg-slate-900 border border-slate-700 rounded text-[10px]">04.진화</button>
      </div>
    </footer>
  </div>

  <script>
    const scenes = [
      { title: "SOONGSIL AI", desc: "융합 캠페인 모듈을 시작합니다." },
      { title: "01. AI 발견", desc: "주변의 AI 흔적을 탐지하세요." },
      { title: "02. 분석 루트", desc: "데이터 패턴을 분석 중입니다." },
      { title: "03. 센서 입력", desc: "사용자 인터랙션을 감지합니다." },
      { title: "04. 진화 단계", desc: "최종 AI 형태가 구현됩니다." }
    ];

    function changeScene(index) {
      const main = document.getElementById('main-content');
      main.style.opacity = 0;
      
      setTimeout(() => {
        document.getElementById('title').innerText = scenes[index].title;
        document.getElementById('desc').innerText = scenes[index].desc;
        main.style.opacity = 1;
      }, 500);
    }
  </script>
</body>
</html>
